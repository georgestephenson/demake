# ld65 configuration for the demake NROM (mapper 0) harness: a 16-byte iNES
# header, one 16 KiB PRG bank ($8000-$FFFF), and one 8 KiB CHR bank. Unused PRG
# is filled with $FF, unused CHR with $00.
MEMORY {
    HEADER: start = $0000, size = $0010, type = ro, file = %O, fill = yes;
    PRG:    start = $c000, size = $4000, type = ro, file = %O, fill = yes, fillval = $ff;
    CHR:    start = $0000, size = $2000, type = ro, file = %O, fill = yes, fillval = $00;
}
SEGMENTS {
    HEADER:  load = HEADER, type = ro;
    CODE:    load = PRG,    type = ro, start = $c000;
    RODATA:  load = PRG,    type = ro;
    VECTORS: load = PRG,    type = ro, start = $fffa;
    CHARS:   load = CHR,    type = ro;
}
