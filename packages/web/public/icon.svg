  <rect x="22" y="6"  width="6" height="6" fill="#1b2733"/>
  <rect x="4"  y="12" width="6" height="6" fill="#9aa6b4"/>
  <rect x="10" y="12" width="6" height="6" fill="#3b6ea5"/>
  <rect x="16" y="12" width="6" height="6" fill="#1b2733"/>
  <rect x="22" y="12" width="6" height="6" fill="#3b6ea5"/>
  <rect x="4"  y="18" width="6" height="6" fill="#3b6ea5"/>
  <rect x="10" y="18" width="6" height="6" fill="#1b2733"/>
  <rect x="16" y="18" width="6" height="6" fill="#3b6ea5"/>
  <rect x="22" y="18" width="6" height="6" fill="#9aa6b4"/>
</svg>
